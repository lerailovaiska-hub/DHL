<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLife Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <h1>UniLife Sign Up</h1>
    <p>Welcome to UniLife! Please sign up to create your account and access all your needs for university life.</p>
    <form id = "signup-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
      <div id="email-error" class="error-message"></div>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create your password" required>
      <div id="passwordStrength" class="password-strength"></div>

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm your password" required>
      <div id="password-error" class="error-message"></div>

      <button type="submit" id="signup-button">Sign Up</button>
    </form>
    <p>Already have an account? <a href="index.html">Log in</a></p>
  </div>
  <script src="script.js"></script>      
</body>
</html>
